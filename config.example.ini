```ini
; PC Gaming Auto Clicker Configuration Example

[General]
; Set the default click interval in milliseconds (1000 ms = 1 second)
ClickInterval=100  
; Enable or disable the auto-start feature when the app launches
AutoStart=false  
; Set the maximum clicks per second (high values can cause in-game issues)
MaxClicksPerSecond=20  

[Hotkeys]
; Define hotkeys for activating/deactivating the auto clicker
StartHotkey=F8          ; Press F8 to start auto clicking
StopHotkey=F9           ; Press F9 to stop auto clicking
ToggleHotkey=F10        ; Press F10 to toggle pause/resume

; Hotkeys for additional features
ConfigHotkey=F11        ; Press F11 to open configuration window

[Features]
; Enable or disable sound notifications when the auto clicker starts/stops
SoundNotifications=true  
; Enable or disable the random click offset to simulate human behavior
RandomClickOffset=true  
; Set the range of random clicks (in milliseconds)
RandomOffsetMin=50      
RandomOffsetMax=200     

[Display]
; Define the opacity of the notification window (0-255)
WindowOpacity=200       
; Enable or disable the display of in-game overlay showing clicks per second
OverlayEnabled=true      
; Set the position of the overlay on the screen (X and Y coordinates)
OverlayPositionX=100    
OverlayPositionY=100    

; Choose the overlay size (small, medium, large)
OverlaySize=medium      

; Customize overlay color (HEX format)
OverlayColor=#FF0000    
```